---
- hosts: all
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install utility packages
      apt:
        name:
          - htop
          - vim
          - curl
        state: present

- hosts: webserver
  become: yes
  tasks:
    - name: Install Docker
      apt:
        name:
          - docker.io
        state: present
        update_cache: yes

    - name: Ensure Docker is started and enabled
      service:
        name: docker
        state: started
        enabled: yes

    - name: Pull Nginx image
      shell: docker pull nginx:latest
      args:
        creates: /var/lib/docker/image/overlay2/repositories.json

    - name: Run Nginx container
      shell: |
        docker rm -f tp-nginx || true
        docker run -d --name tp-nginx -p 80:80 nginx:latest
      args:
        executable: /bin/bash

- hosts: dbserver
  become: yes
  tasks:
    - name: Install MySQL server
      apt:
        name:
          - mysql-server
        state: present
        update_cache: yes

    - name: Ensure MySQL is started and enabled
      service:
        name: mysql
        state: started
        enabled: yes
